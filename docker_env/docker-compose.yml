name: toolbox

services:
  # --- BASE DE DONNÉES (PostgreSQL) ---
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-toolbox_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - toolbox-net

  # --- BACKEND (FastAPI) ---
  api:
    image: 3lv3x/toolbox-api
    container_name: fastapi-api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-toolbox_db}
      FASTAPI_PORT: "${FASTAPI_PORT:-8000}"
    networks:
      - toolbox-net

  # --- FRONTEND (Streamlit) ---
  front:
    image: 3lv3x/toolbox-front
    container_name: streamlit-front
    restart: always
    depends_on:
      - api
    environment:
      BACKEND_URL: "http://api:${FASTAPI_PORT:-8000}"
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    networks:
      - toolbox-net

volumes:
  postgres_data:

networks:
  toolbox-net: