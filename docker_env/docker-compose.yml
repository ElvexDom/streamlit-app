name: toolbox

services:
  # --- BASE DE DONNÉES (PostgreSQL) ---
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-toolbox_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- BACKEND (FastAPI) ---
  api:
    image: 3lv3x/toolbox-api
    container_name: fastapi-api
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-toolbox_db}
      - API_PORT=8080

  # --- FRONTEND (Streamlit) ---
  front:
    image: 3lv3x/toolbox-front
    container_name: streamlit-front
    restart: always
    depends_on:
      - api
    environment:
      - BACKEND_URL=http://api:8080
    ports:
      - "${STREAMLIT_PORT}:8501"

volumes:
  postgres_data: