name: CD Pipeline - Livraison DockerHub

on:
  workflow_run:
    # ATTENTION : Ce nom doit correspondre EXACTEMENT au "name:" de ton premier fichier (CI Quality Check)
    workflows: ["CI Quality Check"]
    types:
      - completed
    branches:
      - main

jobs:
  build-and-push:
    # On vérifie strictement que le pipeline de CI a réussi
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Connexion à DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Étape indispensable pour utiliser build-push-action v6 proprement
      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et Push - FastAPI
        uses: docker/build-push-action@v6
        with:
          context: ./app/fastapi_env
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/toolbox-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/toolbox-api:${{ github.sha }}

      - name: Build et Push - Streamlit
        uses: docker/build-push-action@v6
        with:
          context: ./app/streamlit_env
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/toolbox-front:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/toolbox-front:${{ github.sha }}